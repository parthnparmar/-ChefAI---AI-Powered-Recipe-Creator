name: chefai
description: "AI-Powered Recipe Creator with advanced features"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.1.2
  dio: ^5.4.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  
  # Image Picker (Camera/Gallery)
  image_picker: ^1.0.7
  
  # UI & Animations
  lottie: ^2.7.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  
  # Text to Speech
  flutter_tts: ^4.0.2
  speech_to_text: ^6.6.2
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  
  # Utilities
  uuid: ^4.2.1
  intl: ^0.19.0
  share_plus: ^7.2.1
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  url_launcher: ^6.2.5
  youtube_player_flutter: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
